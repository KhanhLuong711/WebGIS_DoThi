{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Đổi Mật Khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px; border-radius: 16px;">
        <h4 class="fw-bold text-center mb-4 text-primary">Đổi Mật Khẩu</h4>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 fw-bold">Xác nhận đổi</button>
        </form>
        <div class="text-center mt-3">
            <a href="/ban-do/" class="text-decoration-none text-secondary">← Về bản đồ</a>
        </div>
    </div>
</body>
</html>
